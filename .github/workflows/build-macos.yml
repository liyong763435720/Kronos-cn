name: Build macOS App

# 触发条件：
#   1. 推送 v* 标签（如 v1.0.0）→ 自动构建并发布 Release
#   2. 手动触发 → 构建并上传 Artifact（可选发布 Release）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: '创建 GitHub Release（需先手动打标签）'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-macos:
    name: Build macOS (.app + DMG)
    runs-on: macos-14        # Apple Silicon M1，兼容 Intel（通过 Rosetta 2）
    permissions:
      contents: write        # 允许创建 Release 和上传附件

    steps:
      # ── 1. 检出代码 ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 安装 Python 3.11 ──────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. 缓存 pip 包（加速后续构建）────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'webui/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. 安装所有依赖 ──────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # 项目核心依赖
          pip install -r requirements.txt
          pip install -r webui/requirements.txt
          # webui 额外依赖（requirements.txt 中未列出的）
          pip install \
            pyinstaller \
            akshare \
            tushare \
            scikit-learn \
            scipy \
            safetensors==0.6.2 \
            einops==0.8.1

      # ── 5. PyInstaller 打包 ──────────────────────────────────────────
      - name: Build with PyInstaller
        working-directory: webui
        run: |
          python -m PyInstaller kronos_webui_mac.spec --noconfirm
          echo "打包完成，.app 大小："
          du -sh dist/KronosWebUI.app

      # ── 6. 安装 create-dmg 并生成 DMG ───────────────────────────────
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        working-directory: webui
        run: |
          create-dmg \
            --volname "Kronos WebUI" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "KronosWebUI.app" 130 160 \
            --app-drop-link 400 160 \
            --hide-extension "KronosWebUI.app" \
            --no-internet-enable \
            "dist/KronosWebUI.dmg" \
            "dist/KronosWebUI.app"

          echo "DMG 生成完成："
          ls -lh dist/KronosWebUI.dmg

      # ── 7. 上传 Artifact（任何触发方式都会上传，保留 30 天）─────────
      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: KronosWebUI-macOS-${{ github.sha }}
          path: webui/dist/KronosWebUI.dmg
          retention-days: 30

      # ── 8. 发布 GitHub Release（仅 tag 触发 或 手动选择时）──────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Kronos WebUI ${{ github.ref_name }}
          body: |
            ## Kronos WebUI macOS 版本 ${{ github.ref_name }}

            ### 安装方法
            1. 下载 `KronosWebUI.dmg`
            2. 双击打开，将 **KronosWebUI** 拖入 **Applications**
            3. 首次运行：右键 → 打开（绕过 Gatekeeper 安全提示）

            ### 系统要求
            - macOS 12 Monterey 或更高版本
            - Apple Silicon (M1/M2/M3) 或 Intel（通过 Rosetta 2）
            - 首次加载模型需要联网（从 HuggingFace 下载）

            ### 注意
            应用未经 Apple 公证，如遇拦截请在终端执行：
            ```bash
            xattr -rd com.apple.quarantine /Applications/KronosWebUI.app
            ```
          files: webui/dist/KronosWebUI.dmg
          draft: false
          prerelease: false
