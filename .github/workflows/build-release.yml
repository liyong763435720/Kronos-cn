name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Windows 构建 ──────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (.exe installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'webui/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r webui/requirements.txt
          pip install pyinstaller Pillow akshare tushare scikit-learn scipy "safetensors==0.6.2" "einops==0.8.1"

      - name: Cache Kronos models
        uses: actions/cache@v4
        with:
          path: ~\.cache\huggingface\hub
          key: kronos-models-v1

      - name: Download Kronos models
        run: |
          python -c "
import os
from huggingface_hub import snapshot_download
models = [
    'NeoQuasar/Kronos-Tokenizer-2k',
    'NeoQuasar/Kronos-mini',
    'NeoQuasar/Kronos-Tokenizer-base',
    'NeoQuasar/Kronos-small',
    'NeoQuasar/Kronos-base',
]
for repo in models:
    print(f'Downloading {repo}...')
    snapshot_download(repo_id=repo)
    print(f'Done: {repo}')
"

      - name: Convert icon PNG to ICO
        run: |
          python -c "from PIL import Image; img = Image.open('figures/logo.png').convert('RGBA'); img.save('webui/icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)]); print('icon.ico generated')"

      - name: Build with PyInstaller
        working-directory: webui
        run: python -m PyInstaller kronos_webui.spec --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build installer
        working-directory: webui
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          Get-Item dist\KronosWebUI_Setup.exe | Select-Object Name, Length

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: webui/dist/KronosWebUI_Setup.exe
          retention-days: 7

  # ── macOS 构建 ────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS (.app + DMG)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'webui/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r webui/requirements.txt
          pip install pyinstaller akshare tushare scikit-learn scipy safetensors==0.6.2 einops==0.8.1

      - name: Cache Kronos models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: kronos-models-v1

      - name: Download Kronos models
        run: |
          python -c "
import os
from huggingface_hub import snapshot_download
models = [
    'NeoQuasar/Kronos-Tokenizer-2k',
    'NeoQuasar/Kronos-mini',
    'NeoQuasar/Kronos-Tokenizer-base',
    'NeoQuasar/Kronos-small',
    'NeoQuasar/Kronos-base',
]
for repo in models:
    print(f'Downloading {repo}...')
    snapshot_download(repo_id=repo)
    print(f'Done: {repo}')
"

      - name: Convert icon PNG to ICNS
        run: |
          mkdir -p icon.iconset
          sips -z 16   16   figures/logo.png --out icon.iconset/icon_16x16.png
          sips -z 32   32   figures/logo.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32   32   figures/logo.png --out icon.iconset/icon_32x32.png
          sips -z 64   64   figures/logo.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128  128  figures/logo.png --out icon.iconset/icon_128x128.png
          sips -z 256  256  figures/logo.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256  256  figures/logo.png --out icon.iconset/icon_256x256.png
          sips -z 512  512  figures/logo.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512  512  figures/logo.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 figures/logo.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o webui/icon.icns
          echo "icon.icns generated"

      - name: Build with PyInstaller
        working-directory: webui
        run: |
          python -m PyInstaller kronos_webui_mac.spec --noconfirm
          du -sh dist/KronosWebUI.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        working-directory: webui
        run: |
          create-dmg \
            --volname "Kronos WebUI" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "KronosWebUI.app" 130 160 \
            --app-drop-link 400 160 \
            --hide-extension "KronosWebUI.app" \
            --no-internet-enable \
            "dist/KronosWebUI.dmg" \
            "dist/KronosWebUI.app"
          ls -lh dist/KronosWebUI.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: webui/dist/KronosWebUI.dmg
          retention-days: 7

  # ── 统一发布 Release ──────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Kronos WebUI ${{ github.ref_name }}
          body: |
            ## Kronos WebUI ${{ github.ref_name }}

            ### 🪟 Windows 安装包
            下载 `KronosWebUI_Setup.exe`，双击安装即可，**三个模型已内置，无需联网**。
            - 系统要求：Windows 10 及以上

            ### 🍎 macOS 安装包
            下载 `KronosWebUI.dmg`，拖入 Applications 即可，**三个模型已内置，无需联网**。
            - 系统要求：macOS 12 及以上（支持 Apple Silicon 和 Intel）
            - 首次运行：右键 → 打开（绕过安全提示）

            ### 📦 内置模型
            - Kronos-mini（4.1M 参数）
            - Kronos-small（24.7M 参数）
            - Kronos-base（102.3M 参数）
          files: |
            dist/KronosWebUI_Setup.exe
            dist/KronosWebUI.dmg
          draft: false
          prerelease: false
